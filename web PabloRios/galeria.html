        <!-- Script incluido dentro del HTML -->
        <script>
            let currentImageIndex = 0;
            let images = document.querySelectorAll(".gallery .image img");
            let modal = document.getElementById("modal");
            let modalImage = document.getElementById("modalImage");

            function openModal(index) {
                currentImageIndex = index;
                modal.style.display = "block";
                modalImage.src = images[index].src;
            }

            function closeModal() {
                modal.style.display = "none";
            }

            function changeImage(direction) {
                currentImageIndex += direction;
                if (currentImageIndex < 0)  currentImageIndex = images.length - 1;
                else if (currentImageIndex >= images.length) currentImageIndex = 0;
                modalImage.src = images[currentImageIndex].src;
            }

            document.addEventListener('keydown', function(event) {
                if (event.key === "ArrowLeft") changeImage(-1);
                else if (event.key === "ArrowRight") changeImage(1); 
                else if (event.key === "Escape") closeModal();
            });

            document.addEventListener("DOMContentLoaded", function () {
                const preloader = document.getElementById("preloader");
                const logo = document.getElementById("logo");
                const content = document.querySelector(".content");

                // Paso 1: Iniciar la animación de giro del logo
                logo.classList.add("logo-spin");

                // Paso 2: Esperar a que termine el giro y luego deslizar el logo hacia abajo
                logo.addEventListener("animationend", function (event) {
                if (event.animationName === "spin") {
                    // Añadir animación de deslizamiento hacia abajo
                    logo.classList.add("logo-slide-out");

                    // Paso 3: Cuando el logo termine de deslizarse, mostrar el contenido
                    setTimeout(() => {
                        preloader.style.display = "none"; // Ocultar el preloader
                        content.classList.add("visible"); // Mostrar el contenido de la página
                    }, 800); // Tiempo para la animación de deslizamiento
            }
        });
    });

    function toggleMenu() {
        document.body.classList.toggle('menu-open');
    }

        // Abrir/cerrar el submenú de Galería
        function toggleDropdown() {
            const dropdownContent = document.querySelector('.dropdown-content');
            dropdownContent.style.display = (dropdownContent.style.display === 'block') ? 'none' : 'block';

            // Cambiar el icono de "V" a "▲" dependiendo del estado
            const toggleIcon = document.querySelector('.toggle-icon');
            toggleIcon.textContent = (dropdownContent.style.display === 'block') ? '▲' : '▼';
        }

        
        </script>
