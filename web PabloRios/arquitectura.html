<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Arquitectura</title>
    <link rel="stylesheet" href="arquitectura.css">
    <link rel="icon" href="img/camara.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="preloader" id="preloader">
        <img src="img/PrLogo.png" alt="Logo" class="logo" id="logo">
    </div>

    <!-- Botón para abrir el menú en dispositivos móviles y tablets -->
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <div class="container">
        <aside>
            <a href="index.html" class="pr">
                <img src="img/PrLogo.png" alt="Logo" class="logo">
                <span class="nombre">Pablo Rios</span>
            </a>
            <nav>
                <ul>
                    <li><a href="about.html">Sobre mí</a></li>
                    <li class="dropdown">
                        <a class="dropbtn">Galería</a>
                        <ul class="dropdown-content">
                            <li> <a href="galeria.html" class="dropbtn">Galería</a>
                            <li><a href="arquitectura.html">Arquitectura</a></li>
                            <li><a href="paisaje.html">Paisaje</a></li>
                            <li><a href="luces.html">Luces</a></li>
                            <li><a href="retrato.html">Retrato</a></li>
                        </ul>
                    </li>
                    <li><a href="contacto.html">Hablame</a></li>
                    <li><a href="index.html#3">Contactame</a></li>
                </ul>
            </nav>
        </aside>

        <section class="gallery">
            <!-- Fotos de retrato -->
            <div class="image" onclick="openModal(0)">
                <img src="img/IMG/04_RIOS_P.jpg" alt="Retrato 1">
            </div>
            <div class="image" onclick="openModal(1)">
                <img src="img/IMG/08_RIOS_P.jpg" alt="Retrato 2">
            </div>
            <div class="image" onclick="openModal(2)">
                <img src="img/IMG/05_RIOS_P.jpg" alt="Retrato 3">
            </div>
            <div class="image" onclick="openModal(3)">
                <img src="img/IMG/07_RIOS_P.jpg" alt="Retrato 4">
            </div>
            <div class="image" onclick="openModal(4)">
                <img src="img/IMG/10_RIOS_P.jpg" alt="Retrato 5">
            </div>

        </section>
    </div>


    <!-- Modal para las imágenes -->
    <div id="modal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
        <a class="prev" onclick="changeImage(-1)">&#10094;</a>
        <a class="next" onclick="changeImage(1)">&#10095;</a>
    </div>

    <script>
        let currentImageIndex = 0;
        let images = document.querySelectorAll(".gallery .image img");
        let modal = document.getElementById("modal");
        let modalImage = document.getElementById("modalImage");

        function openModal(index) {
            currentImageIndex = index;
            modal.style.display = "block";
            modalImage.src = images[index].src;
        }

        function closeModal() {
            modal.style.display = "none";
        }

        function changeImage(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0)  currentImageIndex = images.length - 1;
            else if (currentImageIndex >= images.length) currentImageIndex = 0;
            modalImage.src = images[currentImageIndex].src;
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "ArrowLeft") changeImage(-1);
            else if (event.key === "ArrowRight") changeImage(1); 
            else if (event.key === "Escape") closeModal();
        });

        document.addEventListener("DOMContentLoaded", function () {
            const preloader = document.getElementById("preloader");
            const logo = document.getElementById("logo");
            const content = document.querySelector(".content");

            logo.classList.add("logo-spin");
            logo.addEventListener("animationend", function (event) {
                if (event.animationName === "spin") {
                    logo.classList.add("logo-slide-out");
                    setTimeout(() => {
                        preloader.style.display = "none";
                        content.classList.add("visible");
                    }, 800);
                }
            });
        });

        function toggleMenu() {
        document.body.classList.toggle('menu-open');
    }
    </script>

</body>
</html>
